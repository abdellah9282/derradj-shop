<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/Logo.png">

  <title>تم تأكيد الطلب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,.1);
    }

    .box h1 {
      color: #2e7d32;
      margin-bottom: 15px;
    }

    .box p {
      color: #333;
      line-height: 1.8;
      font-size: 16px;
    }

    .box a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: #000;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>✅ تم تقديم طلبك بنجاح</h1>

    <p>
      شكرًا لك على ثقتك بنا 🤍<br>
      تم استلام طلبك بنجاح، وسيتصل بك أحد ممثلي فريقنا في أقرب وقت
      لتأكيد الطلب وتفاصيل التوصيل.
    </p>

    <p>
      📞 يرجى التأكد من أن رقم هاتفك متاح.
    </p>

    <a href="../index.html">العودة إلى الصفحة الرئيسية</a>
  </div>

</body>
</html>
