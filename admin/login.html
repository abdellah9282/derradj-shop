<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Login | Derradj Shop</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Styles (نفس صفحة login) -->
  <link rel="stylesheet" href="admin-login.css" />

  <link rel="icon" type="image/jpeg" href="../Logo.jpg" />
</head>

<body class="signup-page">

  <!-- ✅ LOGIN FORM (نفس الكلاسات) -->
  <main class="signup-wrapper">
    <form class="signup-form" id="adminLoginForm">
      <h2>Admin Login</h2>

      <div class="form-group">
        <label for="contact">Email or Phone</label>
        <input type="text" id="contact" name="contact" placeholder="Enter admin email or phone" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />

        <div class="forgot-container">
          <a href="#" class="forgot-link" id="forgotBtn">Forgot password?</a>
        </div>
      </div>

      <button type="submit">Log In</button>

      <p class="form-footer-text" id="statusText" style="color:#b91c1c"></p>

      <p class="form-footer-text">
        هذه الصفحة مخصّصة للإدارة فقط
      </p>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>
</body>
</html>
